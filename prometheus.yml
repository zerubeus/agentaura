global:
  scrape_interval: 15s

scrape_configs:
  # OTel Collector's own metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # OTel Collector's Prometheus exporter (Claude Code metrics)
  - job_name: claude-code-metrics
    static_configs:
      - targets: ["otel-collector:8889"]
